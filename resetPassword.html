<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jelszó visszaállítás | ForgeX</title>
    <link rel="stylesheet" href="css/signIn.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="fixed-bg"></div>
<div id="google_translate_element" style="display:none;"></div>

<div class="content">
    <div class="container">
        <a href="signIn.html" class="vissza-gomb">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div class="header">
            <div class="avatar">
                <i class="fa-solid fa-user"></i>
            </div>
            <h2></h2>
            <p>Jelszó megváltoztatása</p>
        </div>

        <div class="form-box">
            

            <form>
                <label for="email">Írja be az email címét</label> <div class="input-box">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="pelda@email.com" required>
            </div>

                

                

                <button type="submit" class="login-btn">Jelszó visszaállítása <i></i></button>
            </form>
            <p class="signup-text"> <a href="signIn.html">Bejelentkezés</a></p>

           

            
        </div>

        <p class="footer-text">
            A folytatással elfogadod az <a href="contracts.html">Általános Szerződési Feltételeket</a>
            és az <a href="contracts.html">Adatvédelmi Szabályzatot</a>
        </p>
    </div>
</div>

<script src="javascript/index.js"></script>
<script type="module" src="javascript/resetPassword.js"></script>
</body>
</html>
