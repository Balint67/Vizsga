<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regisztráció</title>
    <link rel="stylesheet" href="css/bejelentkezes.css">
    <!-- Font Awesome ikonokhoz -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="avatar">
                <i class="fa-solid fa-user-plus"></i>
            </div>
            <h2>Regisztráció</h2>
            <p>Hozd létre fiókodat</p>
        </div>

        <div class="form-box">
            <div class="tab-buttons">
                
            </div>

            <form id="regForm">
                <label for="fullname">Teljes név</label>
                <div class="input-box">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="fullname" placeholder="Teljes név" required>
                </div>

                <label for="email">Email cím</label>
                <div class="input-box">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" placeholder="pelda@email.com" required>
                </div>

                <label for="phone">Telefonszám</label>
                <div class="input-box">
                    <i class="fa-solid fa-phone"></i>
                    <input type="tel" id="phone" placeholder="06-20-123-4567" required>
                </div>

                <label for="password">Jelszó</label>
                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Minimum 8 karakter" required>
                    <i class="fa-solid fa-eye" id="togglePassword"></i>
                </div>

                <button type="submit" class="login-btn">Regisztráció <i class="fa-solid fa-arrow-right"></i></button>
            </form>

            <p class="signup-text">Van már fiókod? <a href="bejelentkezes.html">Bejelentkezés</a></p>

            <div class="divider">
                <span>vagy</span>
            </div>

            <div class="social-buttons">
                <button><i class="fa-brands fa-google"></i> Google</button>
                <button><i class="fa-brands fa-facebook"></i> Facebook</button>
            </div>
        </div>

        <p class="footer-text">
            A folytatással elfogadod az <a href="szerzodesek.html">Általános Szerződési Feltételeket</a> 
            és az <a href="szerzodesek.html">Adatvédelmi Szabályzatot</a>
        </p>
    </div>
<script src="bejelentkezes.js"></script>

</body>
</html>
