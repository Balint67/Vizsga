<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bejelentkezés</title>
    <link rel="stylesheet" href="bejelentkezes.css">
    <!-- Font Awesome ikonokhoz -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container"> <!-- nagy doboz -->
        <div class="header"> <!-- fejléc -->
            <div class="avatar">
                <i class="fa-solid fa-user"></i> <!-- kis ember ikon -->
            </div>
            <h2>Üdvözlünk</h2>
            <p>Jelentkezz be a fiókodba</p>
        </div>

        <div class="form-box">
            <div class="tab-buttons">
                
            </div>

            <form> <!-- összes mező és gomb -->
                <label for="email">Email cím</label> <!-- kis szöveg -->
                <div class="input-box">
                    <i class="fa-solid fa-envelope"></i> <!-- kis ikon -->
                    <input type="email" id="email" placeholder="pelda@email.com" required> <!-- mező -->
                </div>

                <label for="password">Jelszó</label>
                <div class="input-box">
                    <i class="fa-solid fa-lock"></i> <!-- bal oldali lakat ikon -->
                    <input type="password" id="password" placeholder="Minimum 8 karakter" required> <!-- mező -->
                    <i class="fa-solid fa-eye" id="togglePassword"></i><!-- jobb oldali szem ikon -->
                </div>

                <div class="options">
                    <label><input type="checkbox"> Emlékezz rám</label> <!-- szöveg + kis doboz -->
                    <a href="elfjelszo.html">Elfelejtetted a jelszavad?</a> 
                </div>

                <button type="submit" class="login-btn">Bejelentkezés <i class="fa-solid fa-arrow-right"></i></button> <!-- bejelentkezés gomb + kis nyíl -->
            </form>

            <p class="signup-text">Nincs még fiókod? <a href="regisztracio.html">Regisztrálj itt</a></p>

            <div class="divider">
                <span>vagy</span>
            </div>

            <div class="social-buttons">
                <button><i class="fa-brands fa-google"></i> Google</button>
                <button><i class="fa-brands fa-facebook"></i> Facebook</button>
            </div>
        </div>

        <p class="footer-text">
            A folytatással elfogadod az <a href="szerzodesek.html">Általános Szerződési Feltételeket</a> 
            és az <a href="szerzodesek.html">Adatvédelmi Szabályzatot</a>
        </p>
    </div>
<script src="bejelentkezes.js"></script>
</body>
</html>
