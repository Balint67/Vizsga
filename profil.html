<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilom - ForgeX</title>
    <link rel="stylesheet" href="css/profil.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="profile-container">
    <div class="profile-card">
        <a href="index.html" class="vissza-ikon"><i class="fa-solid fa-arrow-left"></i></a>

        <div class="profile-header">
            <div class="profile-avatar">
                <i class="fa-solid fa-user"></i>
            </div>
            <h1>Profilom</h1>
            <p>Üdvözlünk a fiókodban</p>
        </div>

        <div class="user-details">
            <div class="detail-item">
                <label>Teljes név</label>
                <div class="detail-value" id="prof-name">Betöltés...</div>
            </div>

            <div class="detail-item">
                <label>Email cím</label>
                <div class="detail-value" id="prof-email">Betöltés...</div>
            </div>

            <div class="detail-item">
                <label>Telefonszám</label>
                <div class="detail-value" id="prof-phone">Betöltés...</div>
            </div>
        </div>

        <div class="bookings-preview">
            <h3>Foglalásaid</h3>
            <div id="user-bookings" class="bookings-list">
                <p>Nincsenek aktív foglalások.</p>
            </div>
        </div>

        <button id="logout-btn" class="action-btn">
            Kijelentkezés <i class="fa-solid fa-right-from-bracket"></i>
        </button>
    </div>
</div>

<script type="module" src="javascript/profil.js"></script>
</body>
</html>
