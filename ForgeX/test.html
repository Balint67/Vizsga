<!DOCTYPE html>

<style>
    /* Slide Show */
    .container-slide {
        margin-top: 150px;
        width: 100%;
        overflow: hidden; /* Ez biztosítja, hogy ne lógjon ki semmi */
    }

    .slider-wrapper {
        width: 100%;
        margin: 0 auto;
    }

    .slider {
        /* A látható ablak */
        width: 100%;
        height: auto;
        overflow: hidden; /* NINCS GÖRGETÉS (sem le, sem fel, sem oldalra kézzel) */
        position: relative;

        /* Mobil nézet arány */
        aspect-ratio: 1 / 1;
    }

    /* Tablet és PC nézet */
    @media (min-width: 768px) {
        .slider {
            aspect-ratio: 16 / 5;
        }
    }

    .slide-track {
        display: flex;
        /* Számítás: Van 6 képünk (3 eredeti + 3 másolat).
           Ha azt akarjuk, hogy egyszerre kb 1 látszódjon mobilon,
           vagy 3 PC-n, a flex gondoskodik róla, de a tracknek szélesnek kell lennie.
           Beállítjuk a szélességet 200%-ra (mivel 2 szett kép van) */
        width: 200%;
        animation: scroll 20s linear infinite; /* 20 másodperc alatt ér körbe */
    }

    /* Ha ráviszed az egeret, megáll az animáció (opcionális, de hasznos) */
    .slide-track:hover {
        animation-play-state: paused;
    }

    .slide {
        width: 100%; /* Egyenlően elosztja a helyet */
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden; /* Képvágás biztonság kedvéért */
    }

    .slide img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none; /* Kép ne legyen kijelölhető */
    }

    /* --- KÉPEK EGYEDI POZÍCIÓI (marginok megtartása) --- */
    /* Az ID-k helyett most class-okat használunk, hogy a másolatokra is hasson */
    .img-pos-1 {
        margin-top: -200px;
    }

    .img-pos-2 {
        margin-bottom: -50px;
    }

    .img-pos-3 {
        margin-top: -50px;
    }

    /* --- ANIMÁCIÓ --- */
    @keyframes scroll {
        0% {
            transform: translateX(0);
        }
        100% {
            /* A feléig megyünk el (-50%), mert ott kezdődik a duplikált sor,
               így a visszaugrás észrevétlen lesz. */
            transform: translateX(-50%);
        }
    }

    /* A slider-nav (pöttyök) törölve lettek, mert automata slide-nál nem szokás */
</style>
