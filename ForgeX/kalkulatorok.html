      <h2>BMI Kalkulátor</h2>
      <p>Számold ki a testtömegindexedet!</p>

      <form id="bmiForm">
        <label for="weight">Testsúly (kg)</label>
        <input type="number" id="weight" placeholder="pl. 70" required>

        <label for="height">Magasság (cm)</label>
        <input type="number" id="height" placeholder="pl. 175" required>

        <button class="btn" type="submit">Számítás</button>
      </form>

      <div id="result"></div>
    </div>
