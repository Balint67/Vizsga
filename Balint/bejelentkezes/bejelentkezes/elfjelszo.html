<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bejelentkezés</title>
    <link rel="stylesheet" href="bejelentkezes.css">
    <!-- Font Awesome ikonokhoz -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container"> <!-- nagy doboz -->
        <div class="header"> <!-- fejléc -->
            <div class="avatar">
                <i class="fa-solid fa-user"></i> <!-- kis ember ikon -->
            </div>
            <h2></h2>
            <p>Jelszó megváltoztatása</p>
        </div>

        <div class="form-box">
            

            <form>
                <label for="elfjelszo">Írja be az email címét</label>
                <div class="input-box">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" placeholder="pelda@email.com" required>
                </div>

                

                

                <button type="submit" class="login-btn">Jelszó visszaállítása <i></i></button>
            </form>
            <p class="signup-text"> <a href="bejelentkezes.html">Bejelentkezés</a></p>

           

            
        </div>

        <p class="footer-text">
            A folytatással elfogadod az <a href="szerzodesek.html">Általános Szerződési Feltételeket</a> 
            és az <a href="szerzodesek.html">Adatvédelmi Szabályzatot</a>
        </p>
    </div>
<script src="index.js"></script>
</body>
</html>
